<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chaturaji Multiplayer</title>
  <style>
    body { font-family: sans-serif; }
    #board { display: grid; grid-template-columns: repeat(8, 60px); gap: 2px; }
    .cell { width: 60px; height: 60px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .red { background-color: #ffcccc; }
    .blue { background-color: #cce0ff; }
    .green { background-color: #ccffcc; }
    .yellow { background-color: #ffffcc; }
  </style>
</head>
<body>
  <h1>Chaturaji Multiplayer</h1>
  <div id="board"></div>
  <script type="module" src="main.js"></script>
</body>
</html>
